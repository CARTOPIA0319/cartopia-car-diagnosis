name: Hourly inventory update

on:
  schedule:
    - cron: "7 * * * *"

  workflow_dispatch:

concurrency:
  group: cartopia-hourly-inventory-update
  cancel-in-progress: false

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger CARTOPIA inventory update
        shell: bash
        run: |
          set -euo pipefail

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 10 \
            --max-time 30 \
            "https://cartopia-car-diagnosis.vercel.app/api/inventory/update?save=1&source=github-actions"
